  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <style>
    :root {
      --bg: #f3f7fc;
      --card: #ffffff;
      --card-soft: #f8fbff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe5f0;
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --accent-soft: rgba(37, 99, 235, 0.10);

      --patent: #dbeafe;
      --registered: #dcfce7;
      --product: #fef3c7;
      --award: #fee2e2;
      --author: #e0f2fe;
      --reviewed: #ede9fe;

      --shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.06);
      --shadow-card: 0 10px 26px rgba(37, 99, 235, 0.07);

      --radius: 22px;
      --radius-lg: 28px;
      --maxw: 1140px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP",
        "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
      line-height: 1.5;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.08), transparent 24%),
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.05), transparent 22%),
        linear-gradient(180deg, #f8fbff 0%, #f3f7fc 100%);
      font-size: 14px;
      letter-spacing: 0.01em;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      width: min(var(--maxw), calc(100% - 24px));
      margin: 0 auto;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(243, 247, 252, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(219, 229, 240, 0.92);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
    }

    .brand {
      font-size: 0.98rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      color: var(--text);
      white-space: nowrap;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      min-width: 0;
    }

    .nav a {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--muted);
      padding: 4px 2px;
    }

    .nav a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    .lang-switch {
      display: flex;
      gap: 6px;
      margin-left: 6px;
    }

    .lang-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.74rem;
      font-weight: 900;
      cursor: pointer;
      transition: .18s ease;
    }

    .lang-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    .hero {
      padding: 22px 0 10px;
    }

    .hero-card {
      display: grid;
      grid-template-columns: 1.4fr 0.72fr;
      gap: 24px;
      align-items: center;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 26px 28px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.09) 0%, rgba(37,99,235,0.02) 52%, transparent 72%);
      pointer-events: none;
    }

    .hero-left {
      min-width: 0;
      max-width: 760px;
    }

    .hero-right {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(2.2rem, 4vw, 3.15rem);
      line-height: 1.02;
      letter-spacing: -0.055em;
    }

    .name-ja {
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .subtitle {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--accent-2);
      font-weight: 900;
    }

    .brand-stack {
      display: grid;
      gap: 8px;
      margin: 0 0 14px;
    }

    .brand-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      padding: 0;
      margin: 0;
    }

    .brand-main {
      color: var(--accent);
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.35;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
      line-height: 1.35;
      white-space: nowrap;
    }

    .timeline-affiliation {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .timeline-affiliation-main {
      color: var(--text);
      font-weight: 900;
    }

    .timeline-affiliation-sub {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .lead {
      margin: 0;
      color: #334155;
      font-size: 0.95rem;
      max-width: 720px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      margin-bottom: 4px;
    }

    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      display: inline-block;
      padding: 9px 13px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      font-weight: 850;
      font-size: 0.84rem;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.03);
      transition: .18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.25);
    }

    .hero-side-card {
      width: 178px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid rgba(37, 99, 235, 0.12);
      border-radius: 22px;
      padding: 14px;
      box-shadow: var(--shadow-soft);
      text-align: center;
    }

    .section-card,
    .stat-tile,
    .patent-card,
    .pub-item,
    .award-item,
    .society-item,
    .impact-card,
    .product-hero-card,
    .cert-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .section {
      padding: 10px 0;
    }

    .section-card {
      box-shadow: var(--shadow-soft);
      padding: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .section-head h2 {
      position: relative;
      padding-left: 12px;
    }

    .section-head h2::before {
      content: "";
      position: absolute;
      left: 0;
      top: 3px;
      bottom: 3px;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, #2563eb 0%, #60a5fa 100%);
    }

    h2 {
      margin: 0;
      font-size: 1.16rem;
      letter-spacing: -0.03em;
    }

    h3.group-title {
      margin: 0 0 7px;
      font-size: 0.95rem;
      color: #0f172a;
    }

    .muted,
    .note {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .chip {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent-2);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .highlight-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .product-hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .product-hero-card {
      position: relative;
      padding: 44px 16px 16px;
      box-shadow: var(--shadow-card);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid rgba(37, 99, 235, 0.12);
      transition: .18s ease;
      overflow: hidden;
      min-width: 0;
    }

    .product-hero-card:hover,
    .patent-card:hover,
    .pub-item:hover,
    .award-item:hover,
    .impact-card:hover,
    .cert-card:hover,
    .society-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.08);
    }

    .product-hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      min-width: 0;
    }

    .product-hero-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.35;
      letter-spacing: -0.02em;
      flex: 1 1 auto;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: auto-phrase;
    }

    .product-hero-date {
      font-size: 0.78rem;
      font-weight: 900;
      color: var(--accent-2);
      white-space: nowrap;
      flex: 0 0 auto;
      background: var(--accent-soft);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .product-hero-desc {
      font-size: 0.84rem;
      color: #334155;
      margin-bottom: 8px;
      overflow-wrap: anywhere;
    }

    .product-hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .product-hero-links a {
      font-size: 0.77rem;
      font-weight: 800;
      padding: 5px 8px;
      background: #f1f5f9;
      border-radius: 8px;
      white-space: nowrap;
    }

    .stat-tile {
      padding: 10px 10px;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.04);
      position: relative;
      overflow: hidden;
      border-width: 1px;
      border-style: solid;
      border-radius: var(--radius);
    }

    .stat-tile::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      border-radius: 999px;
      opacity: 0.95;
    }

    .stat-label {
      font-size: 0.82rem;
      font-weight: 950;
      line-height: 1.32;
      letter-spacing: 0.01em;
      white-space: pre-line;
    }

    .stat-blue {
      background: linear-gradient(135deg, #eef4ff 0%, #dbeafe 100%);
      border-color: #93c5fd;
    }
    .stat-blue::before {
      background: #2563eb;
    }
    .stat-blue .stat-label {
      color: #2563eb;
    }

    .stat-red {
      background: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 100%);
      border-color: #fda4af;
    }
    .stat-red::before {
      background: #e11d48;
    }
    .stat-red .stat-label {
      color: #e11d48;
    }

    .stat-purple {
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
      border-color: #c4b5fd;
    }
    .stat-purple::before {
      background: #7c3aed;
    }
    .stat-purple .stat-label {
      color: #7c3aed;
    }

    .stat-green {
      background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
      border-color: #4ade80;
    }
    .stat-green::before {
      background: #15803d;
    }
    .stat-green .stat-label {
      color: #166534;
    }

    .timeline {
      display: grid;
      gap: 8px;
    }

    .internship-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .internship-item {
      border: 1px solid rgba(219, 229, 240, 0.75);
      border-radius: 14px;
      padding: 9px 11px;
      background: #fdfefe;
      box-shadow: none;
    }

    .internship-item .timeline-year {
      font-size: 0.75rem;
      margin-bottom: 3px;
      color: var(--muted);
    }

    .internship-item .timeline-title {
      font-size: 0.77rem;
      font-weight: 600;
      line-height: 1.35;
      color: #475569;
      margin-bottom: 0;
    }

    .internship-note {
      font-size: 0.68em;
      font-weight: 600;
      color: #94a3b8;
      white-space: nowrap;
    }

    .timeline-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      background: linear-gradient(180deg, #fbfdff 0%, #f8fbff 100%);
    }

    .timeline-year {
      font-weight: 900;
      color: var(--text);
      font-size: 0.78rem;
      margin-bottom: 2px;
    }

    .timeline-title {
      font-weight: 850;
      font-size: 0.92rem;
      margin-bottom: 2px;
    }

    .tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
      margin-bottom: 12px;
    }

    .search-input,
    .select-input {
      border: 1px solid var(--line);
      background: white;
      border-radius: 12px;
      padding: 9px 11px;
      font-size: 0.84rem;
      min-width: 150px;
      outline: none;
    }

    .search-input:focus,
    .select-input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .search-input {
      flex: 1 1 220px;
    }

    .publication-grid-2,
    .award-list,
    .impact-list {
      display: grid;
      gap: 8px;
    }

    .publication-grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .patent-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .society-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .cert-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .award-list.compact {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .patent-card,
    .pub-item,
    .award-item,
    .society-item,
    .cert-card {
      padding: 11px 13px;
    }

    .patent-title,
    .pub-title,
    .award-title {
      font-weight: 850;
      font-size: 0.9rem;
      line-height: 1.36;
      margin-bottom: 3px;
    }

    .patent-authors,
    .pub-authors,
    .pub-meta,
    .award-meta {
      color: var(--muted);
      font-size: 0.79rem;
      margin-bottom: 3px;
    }

    .pub-item {
      padding-top: 9px;
      padding-bottom: 9px;
    }

    .pub-title,
    .pub-authors {
      margin-bottom: 2px;
    }

    .pub-meta {
      margin-bottom: 0;
      line-height: 1.32;
    }

    .patent-tags,
    .pub-tags,
    .impact-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .tag {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.70rem;
      font-weight: 900;
      border: 1px solid transparent;
      color: #334155;
      background: #eef2f7;
    }

    .tag.primary {
      background: var(--patent);
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    .tag.registered {
      background: var(--registered);
      color: #166534;
      border-color: #bbf7d0;
    }

    .tag.product {
      background: var(--product);
      color: #92400e;
      border-color: #fde68a;
    }

    .tag.award {
      background: var(--award);
      color: #b91c1c;
      border-color: #fecaca;
    }

    .tag.author {
      background: var(--author);
      color: #0369a1;
      border-color: #bae6fd;
    }

    .tag.reviewed {
      background: var(--reviewed);
      color: #6d28d9;
      border-color: #ddd6fe;
    }

    .patent-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
      margin-top: 4px;
      font-size: 0.80rem;
      color: var(--muted);
    }

    .patent-meta-item {
      min-width: 0;
    }

    .patent-meta-item.full {
      grid-column: 1 / -1;
    }

    .patent-meta-item strong {
      color: var(--text);
      font-weight: 850;
      margin-right: 6px;
    }

    .impact-card {
      padding: 14px;
    }

    .impact-card-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .impact-card-title {
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.35;
      margin: 0;
    }

    .impact-card-period {
      font-size: 0.78rem;
      color: var(--accent-2);
      font-weight: 900;
      white-space: nowrap;
      background: var(--accent-soft);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .impact-card-desc {
      color: #334155;
      font-size: 0.84rem;
      margin-bottom: 0;
      white-space: pre-line;
    }

    .award-item.compact .award-title {
      margin-bottom: 1px;
      font-size: 0.88rem;
    }

    .award-item.compact .award-meta {
      margin-bottom: 1px;
      font-size: 0.76rem;
    }

    .society-item,
    .cert-card {
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .cert-title {
      font-size: 0.86rem;
      font-weight: 850;
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .cert-meta {
      font-size: 0.76rem;
      color: var(--muted);
    }

    .stat-span-2 {
      grid-column: span 2;
    }

    .product-feature-badge {
      position: absolute;
      top: 14px;
      left: 16px;
      display: inline-block;
      margin-bottom: 0;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.70rem;
      font-weight: 900;
      background: rgba(37, 99, 235, 0.10);
      color: var(--accent-2);
      border: 1px solid rgba(37, 99, 235, 0.16);
      max-width: calc(100% - 32px);
      z-index: 1;
    }

    .mobile-secondary {
      display: inline-flex;
    }

    .count-note {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      margin-left: 4px;
    }

    .cert-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .tag.verified {
      background: #ecfeff;
      color: #0f766e;
      border-color: #a5f3fc;
    }


    .footer {
      padding: 20px 0 34px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .name-strong {
      font-weight: 950;
      color: var(--text);
    }

    [data-lang] { display: none; }
    [data-lang-block] { display: none; }

    html[lang-mode="ja"] [data-lang="ja"] { display: inline; }
    html[lang-mode="ja"] [data-lang-block="ja"] { display: block; }
    html[lang-mode="en"] [data-lang="en"] { display: inline; }
    html[lang-mode="en"] [data-lang-block="en"] { display: block; }

    html[lang-mode="en"] .hero-left h1 {
      margin-bottom: 12px;
    }


    .timeline-year {
      color: #111827 !important;
    }

    .timeline-affiliation-main {
      color: #111827 !important;
    }

    .timeline-title {
      color: #0f172a;
    }

    .timeline-item {
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

      gap: 10px;
